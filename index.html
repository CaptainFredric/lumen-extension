<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lumen</title>
    <meta http-equiv="refresh" content="0; url=./docs/" />
    <link rel="icon" href="./docs/brandmark.svg" type="image/svg+xml" />
    <script>
      window.location.replace("./docs/");
    </script>
    <style>
      :root {
        color-scheme: dark;
        font-family: "SF Pro Display", "IBM Plex Sans", sans-serif;
        background: #07111c;
        color: #f4f7fb;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(138, 241, 213, 0.16), transparent 24%),
          radial-gradient(circle at top right, rgba(123, 183, 255, 0.18), transparent 22%),
          linear-gradient(180deg, #050810 0%, #07111c 100%);
      }

      main {
        width: min(560px, calc(100% - 32px));
        padding: 28px;
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(10, 18, 30, 0.82);
        backdrop-filter: blur(18px);
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: 2rem;
      }

      p {
        margin-top: 12px;
        color: rgba(244, 247, 251, 0.76);
        line-height: 1.6;
      }

      a {
        color: #8af1d5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Redirecting to the Lumen landing page</h1>
      <p>
        If the redirect does not happen automatically,
        <a href="./docs/">open the public product page here</a>.
      </p>
    </main>
  </body>
</html>
