<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lumen | Redirecting</title>
    <meta http-equiv="refresh" content="0; url=../" />
    <link rel="canonical" href="https://captainfredric.github.io/lumen-extension/" />
    <script>
      window.location.replace("../");
    </script>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Space Grotesk", "SF Pro Display", sans-serif;
        background: #050810;
        color: #f4f7fb;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(134, 221, 255, 0.16), transparent 28%),
          linear-gradient(180deg, #050810 0%, #07111c 100%);
      }

      main {
        width: min(520px, calc(100% - 32px));
        padding: 28px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        background: rgba(10, 18, 30, 0.82);
      }

      h1,
      p {
        margin: 0;
      }

      p {
        margin-top: 12px;
        color: rgba(244, 247, 251, 0.76);
        line-height: 1.6;
      }

      a {
        color: #86ddff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Lumen moved to the root URL.</h1>
      <p>
        <a href="../">Open the current Lumen page</a>.
      </p>
    </main>
  </body>
</html>
